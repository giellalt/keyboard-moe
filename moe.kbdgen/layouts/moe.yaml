        \s{shiftSymbols} вӮ¬ $ ВЈ ^ [ ] { } вҖ” В° вҖҰ \s{shiftSymbols}
        \s{spacer:1.5}    В§ | ~ вү  \ < > ! ?    \s{spacer:0.5} \s{return:2}
